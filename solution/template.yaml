AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NetLab Scheduler - Woche 7 - LÖSUNG

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          TABLE_NAME: !Ref BookingsTable
      Events:
        DefaultRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SchedulerApi
        OptionsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SchedulerApi
            Method: OPTIONS
            Path: /{proxy+}
            Auth:
              Authorizer: NONE

  BookingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: calendarWeek
          AttributeType: S
        - AttributeName: bookingId
          AttributeType: S
      KeySchema:
        - AttributeName: calendarWeek
          KeyType: HASH
        - AttributeName: bookingId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  SchedulerApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer

  FrontendApp:
    Type: AWS::Amplify::App
    Properties:
      Name: netlab-scheduler-frontend
      Platform: WEB

  FrontendBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt FrontendApp.AppId
      BranchName: main

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: netlab-scheduler-pool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub "netlab-scheduler-${AWS::AccountId}"

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: netlab-scheduler-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub "https://main.${FrontendApp.AppId}.amplifyapp.com"
        - !Sub "https://main.${FrontendApp.AppId}.amplifyapp.com/"
      LogoutURLs:
        - !Sub "https://main.${FrontendApp.AppId}.amplifyapp.com"
        - !Sub "https://main.${FrontendApp.AppId}.amplifyapp.com/"

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: Administratoren mit erweiterten Rechten

  ThomasUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: thomas
      MessageAction: SUPPRESS
      UserAttributes:
        - Name: email
          Value: thomas@netlab.local
        - Name: email_verified
          Value: "true"

  MariaUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: maria
      MessageAction: SUPPRESS
      UserAttributes:
        - Name: email
          Value: maria@netlab.local
        - Name: email_verified
          Value: "true"

  MariaAdminMembership:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    DependsOn: MariaUser
    Properties:
      GroupName: !Ref AdminGroup
      Username: maria
      UserPoolId: !Ref UserPool

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${SchedulerApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  CognitoDomain:
    Value: !Sub "https://netlab-scheduler-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
  AmplifyAppId:
    Value: !GetAtt FrontendApp.AppId
  FrontendUrl:
    Value: !Sub "https://main.${FrontendApp.AppId}.amplifyapp.com"
